name: Dependabot Auto-Merge

on:
  pull_request:

jobs:
  auto-merge:
    uses: mac-lucky/actions-shared-workflows/.github/workflows/dependabot-auto-merge-reusable.yml@master
    permissions:
      contents: write
      pull-requests: write
      actions: write
      workflows: write
      checks: read
      statuses: read
    with:
      code_analysis_check_name: "build"
      container_test_check_name: ""
